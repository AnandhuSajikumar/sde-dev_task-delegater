services:
  db:
    container_name: postgres-spring-boot
    image: sha256:38d5c9d522037d8bf0864c9068e4df2f8a60127c6489ab06f98fdeda535560f9
    environment:
      POSTGRES_USER: nodev
      POSTGRES_PASSWORD: password
      PGDATA: /data/sdedev
      TZ: Asia/Kolkata
    volumes:
      - db:/data/sdedev
    ports:
      - "5332:5432"

    networks:
      - backend
    restart: unless-stopped

networks:
  backend:
    driver: bridge

volumes:
  db:
